version: "3.9"

services:
  db:
    image: postgres:15
    container_name: realitycheck_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: realitycheck
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: realitycheck_app
    depends_on:
      - db
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/realitycheck
    command: >
      python -m uvicorn app.main:app --host 0.0.0.0 --port 8000

volumes:
  postgres_data: