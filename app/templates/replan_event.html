{% extends "base.html" %}
{% block content %}

<link rel="stylesheet" href="{{ url_for('static', path='css/fail_event.css') }}">
<div class="fail-container">

    <h1><strong>Replan Event</strong></h1>
    <p class="subtitle">
        Turn this failure into a future success.
    </p>

    <div class="event-preview">
    <div class="preview-header">
        <h2>{{ event.title }}</h2>
        <span class="badge replanned">REPLANNED</span>
    </div>

    <div class="preview-progress">
        <div class="progress-track">
            <div class="progress-fill" style="width: {{ event.progress }}%;"></div>
        </div>
        <span>{{ event.progress }}%</span>
    </div>

    <p class="preview-description">
        {{ event.description or "No description provided." }}
    </p>
    </div>

    <div class="failure-box">
        <h3>What went wrong last time?</h3>
        <p>{{ event.failure_note }}</p>
    </div>

    <form method="post" class="fail-form">
        <div class="fail-actions">
            <button type="submit" class="btn-fail">
                Replan & Continue
            </button>

            <a href="/" class="btn-back">
                Back
            </a>
        </div>
    </form>

</div>

{% endblock %}
